<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>灵流 LingFlow · 浏览器扩展</title>
<style>
/* ===== LingFlow Design System Tokens (shared with desktop) ===== */
:root {
  --bg:            oklch(98% 0.005 245);
  --surface:       oklch(100% 0 0);
  --surface-raised:oklch(97% 0.008 245);
  --fg:            oklch(18% 0.02 250);
  --muted:         oklch(48% 0.018 250);
  --border:        oklch(90% 0.008 245);
  --primary:       oklch(52% 0.16 240);
  --primary-hover: oklch(48% 0.17 240);
  --primary-ghost: oklch(52% 0.16 240 / 0.08);
  --accent:        oklch(62% 0.14 195);
  --accent-ghost:  oklch(62% 0.14 195 / 0.10);
  --toggle-off:    #D8E7EF;
  --toggle-off-border: #B7CCD8;
  --toggle-on:     #12BFA8;
  --toggle-on-border: #0E9F8E;
  --success:       oklch(58% 0.16 160);
  --success-ghost: oklch(58% 0.16 160 / 0.10);
  --warning:       oklch(65% 0.14 85);
  --warning-ghost: oklch(65% 0.14 85 / 0.10);
  --danger:        oklch(52% 0.18 25);
  --danger-ghost:  oklch(52% 0.18 25 / 0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.04);
  --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.06);
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', ui-monospace, 'SF Mono', Menlo, monospace;
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
}
.dark {
  --bg:            oklch(15% 0.025 250);
  --surface:       oklch(20% 0.02 250);
  --surface-raised:oklch(24% 0.022 250);
  --fg:            oklch(95% 0.005 245);
  --muted:         oklch(62% 0.015 250);
  --border:        oklch(28% 0.018 250);
  --primary:       oklch(64% 0.16 240);
  --primary-hover: oklch(68% 0.17 240);
  --primary-ghost: oklch(64% 0.16 240 / 0.12);
  --accent:        oklch(70% 0.14 195);
  --accent-ghost:  oklch(70% 0.14 195 / 0.12);
  --toggle-off:    #24313B;
  --toggle-off-border: #3A4C58;
  --toggle-on:     #20D6BE;
  --toggle-on-border: #28E2C9;
  --success:       oklch(64% 0.16 160);
  --success-ghost: oklch(64% 0.16 160 / 0.12);
  --warning:       oklch(70% 0.14 85);
  --warning-ghost: oklch(70% 0.14 85 / 0.12);
  --danger:        oklch(58% 0.18 25);
  --danger-ghost:  oklch(58% 0.18 25 / 0.12);
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--fg);
  width: 360px;
  min-height: 550px;
  overflow-x: hidden;
  transition: background var(--transition-base), color var(--transition-base);
}

/* ===== Popup Shell ===== */
.popup-shell {
  display: flex;
  flex-direction: column;
  min-height: 550px;
}

/* ===== Header ===== */
.popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.popup-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 650;
  font-size: 14px;
  letter-spacing: -0.01em;
}
.popup-brand svg { width: 20px; height: 20px; }
.popup-header-actions { display: flex; gap: 6px; }

/* ===== Content ===== */
.popup-content {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}

/* ===== Section ===== */
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 8px;
}

/* ===== Toggle Row ===== */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.toggle-label {
  font-size: 13px;
  font-weight: 550;
}
.toggle-row .toggle { --toggle-w: 40px; --toggle-h: 22px; --toggle-pad: 2px; }

/* ===== Select & Input ===== */
.select-field, .input-field {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg);
  color: var(--fg);
  font-size: 12.5px;
  font-family: inherit;
  transition: border-color var(--transition-fast);
}
.select-field:focus, .input-field:focus { outline: none; border-color: var(--primary); }
.input-field::placeholder { color: var(--muted); }
.input-field.mono { font-family: var(--font-mono); font-size: 12px; }
.readonly-field {
  width: 100%;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
  color: var(--fg);
  font-size: 12.5px;
}
.readonly-field .status-chip {
  flex: 0 0 auto;
  font-size: 10px;
}

/* ===== Provider Card ===== */
.provider-card {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.provider-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.provider-card-name {
  font-size: 12.5px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.provider-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.provider-dot.free { background: var(--muted); }
.provider-dot.ai { background: var(--accent); }

.popup-content .btn { gap: 5px; padding: 7px 14px; font-size: 12.5px; font-weight: 550; }
.popup-content .btn-sm { padding: 5px 10px; font-size: 11.5px; }

/* ===== Action Buttons Grid ===== */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* ===== Status Bar ===== */
.status-bar {
  padding: 10px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11.5px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.ok { background: var(--success); }
.status-dot.warn { background: var(--warning); }

/* ===== Test Feedback ===== */
.test-result {
  font-size: 11px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  display: none;
  align-items: center;
  gap: 6px;
}
.test-result.show { display: flex; }
.test-result.success { background: var(--success-ghost); color: var(--success); }
.test-result.error { background: var(--danger-ghost); color: var(--danger); }

.popup-header .theme-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); }
.popup-header .theme-btn svg { width: 14px; height: 14px; }

/* ===== Budget Warning ===== */
.budget-warning {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  background: var(--warning-ghost);
  border: 1px solid oklch(65% 0.14 85 / 0.2);
  font-size: 11.5px;
  line-height: 1.5;
  color: var(--warning);
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.budget-warning svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

.status-chip {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 0 8px;
  border-radius: 999px;
  background: var(--success-ghost);
  color: var(--success);
  font-size: 11px;
  font-weight: 650;
  white-space: nowrap;
}

.popup-content .config-fields > div {
  grid-template-columns: minmax(96px, 1fr) minmax(0, auto);
  gap: 10px;
}

.config-value {
  justify-self: end;
  min-width: 0;
  max-width: 180px;
  color: var(--fg);
  font-size: 12.5px;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== Label ===== */
.field-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 2px;
}
</style>
<link rel="stylesheet" href="shared-components.css">
</head>
<body>
<div class="popup-shell">

  <!-- Header -->
  <header class="popup-header">
    <div class="popup-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2Z"/>
        <path d="M8 12c0-2 .8-3.8 2-5"/>
        <path d="M14 7c1.2 1.2 2 3 2 5"/>
        <path d="M7 14c1 1.5 2.8 2.5 5 2.5s4-1 5-2.5"/>
      </svg>
      灵流 LingFlow
    </div>
    <div class="popup-header-actions">
      <button class="theme-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
        <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="popup-content">

    <!-- Enabled Toggle -->
    <div class="toggle-row">
      <span class="toggle-label">启用灵流翻译</span>
      <label class="toggle"><input type="checkbox" checked id="enabledToggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
    </div>

    <!-- Provider & Language -->
    <div>
      <div class="section-title">翻译设置</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div>
          <span class="field-label">桌面端服务路由</span>
          <div class="readonly-field" id="desktopRouteStatus">
            <span>跟随桌面端</span>
            <span class="status-chip">自动</span>
          </div>
        </div>
        <div>
          <span class="field-label">目标语言</span>
          <select class="select-field" id="targetLanguage" onchange="saveSetting('extensionTargetLanguage', this.value)">
            <option value="zh-CN" selected>简体中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="auto">跟随桌面端</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Local Proxy Status -->
    <div>
      <div class="section-title">本地代理</div>
      <div class="provider-card">
        <div class="provider-card-header">
          <span class="provider-card-name"><span class="provider-dot ai"></span> 桌面端代理</span>
          <span class="status-chip">已连接</span>
        </div>
        <div class="budget-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 12a8 8 0 0 1 16 0"/><path d="M7 12a5 5 0 0 1 10 0"/><path d="M10 12a2 2 0 0 1 4 0"/><circle cx="12" cy="17" r="1.5"/></svg>
          <span>扩展通过本地代理调用桌面端服务源；服务凭据、模型和端点统一在桌面端“服务源配置”中管理。</span>
        </div>
        <div class="config-fields">
          <div>
            <span class="config-field-label">代理地址</span>
            <span class="config-value mono">127.0.0.1:43873</span>
          </div>
          <div>
            <span class="config-field-label">当前服务源</span>
            <span class="config-value">DeepSeek AI · 桌面端托管</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-block" id="proxyTestBtn">检查本地代理</button>
        <div class="test-result" id="proxyTestResult"></div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-grid">
      <button class="btn btn-primary" onclick="handleAction('selection')">划词翻译</button>
      <button class="btn btn-primary" onclick="handleAction('page')">整页翻译</button>
      <button class="btn btn-ghost" style="grid-column:1/-1" onclick="handleAction('clear')">清除页面翻译</button>
    </div>

  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-dot ok"></span>
    <span id="statusText">就绪 — 本地代理已连接</span>
  </div>

</div>

<script src="shared-components.js"></script>
<script>
// ===== Theme Toggle =====
const html = document.documentElement;
LingFlowComponents.bindThemeToggle({
  storageKey: 'lingflow-popup-theme',
  sunId: 'sunIcon',
  moonId: 'moonIcon'
});

// ===== Local Proxy Check (simulated) =====
const proxyTestBtn = document.getElementById('proxyTestBtn');
if (proxyTestBtn) {
  proxyTestBtn.addEventListener('click', function() {
    const resultEl = document.getElementById('proxyTestResult');
    const originalText = this.textContent;

    this.textContent = '检查中…';
    this.disabled = true;

    setTimeout(() => {
      resultEl.className = 'test-result show success';
      resultEl.textContent = '✓ 本地代理在线 · 延迟 24ms';
      this.textContent = originalText;
      this.disabled = false;
    }, 600);
  });
}

// ===== Action Buttons =====
function handleAction(type) {
  const statusEl = document.getElementById('statusText');
  const dot = document.querySelector('.status-dot');
  const messages = {
    selection: '正在翻译选中文本…',
    page: '正在翻译当前页面…',
    clear: '已清除页面翻译'
  };
  statusEl.textContent = messages[type];
  dot.className = 'status-dot ' + (type === 'clear' ? 'ok' : 'ok');
  setTimeout(() => {
    statusEl.textContent = '就绪 — 本地代理已连接';
  }, 2000);
}
</script>
</body>
</html>
